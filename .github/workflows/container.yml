name: Docker Build and Push to ACR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Login en GitHub Container Registry (Opcional, pero recomendado)
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. Login en Azure Container Registry (ACR)
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_NAME }}.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 3. Construir y Etiquetar la imagen
      # Se etiqueta para GitHub y para Azure simultáneamente
      - name: Build and Tag Docker Image
        run: |
          docker build . -t ghcr.io/${{ github.repository }}/scraper:latest \
                         -t ${{ secrets.ACR_NAME }}.azurecr.io/scraper-loto:latest \
                         -t ${{ secrets.ACR_NAME }}.azurecr.io/scraper-loto:${{ github.sha }}

      # 4. Push a GitHub Packages
      - name: Push to GHCR
        run: docker push ghcr.io/${{ github.repository }}/scraper:latest

      # 5. Push a Azure Container Registry
      - name: Push to ACR
        run: |
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/scraper-loto:latest
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/scraper-loto:${{ github.sha }}
